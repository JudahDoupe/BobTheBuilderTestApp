# wasm32 build config for the BuilderBot live preview (NEXT-STEPS §6). getrandom
# 0.3 refuses to compile for wasm32-unknown-unknown unless its browser backend is
# selected via this cfg — and it needs the crate's `wasm_js` feature enabled too
# (see the wasm-target dep in Cargo.toml). Scoped to the wasm target, so native
# `cargo build`/`test` verify is unaffected.
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
